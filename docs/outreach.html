<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outreach Pipeline - Hotel Researcher</title>
  <style>
/* === HOTEL RESEARCHER - VISUAL REDESIGN === */
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0a0a;
  --bg-card: #141414;
  --bg-elevated: #1a1a1a;
  --bg-hover: #1f1f1f;
  --primary: #2ea3f2;
  --primary-dim: rgba(46, 163, 242, 0.15);
  --primary-hover: #1b8ad4;
  --primary-glow: rgba(46, 163, 242, 0.15);
  --gold: #c9a94e;
  --gold-dim: rgba(201, 169, 78, 0.15);
  --white: #ffffff;
  --text: #e0e0e0;
  --text-dim: #999;
  --text-muted: #666;
  --border: #1e1e1e;
  --border-light: #2a2a2a;
  --green: #2ecc71;
  --green-dim: rgba(46, 204, 113, 0.15);
  --red: #e54d4d;
  --purple: #a855f7;
  --radius: 16px;
  --radius-sm: 8px;
  --radius-xs: 4px;
  --transition: 0.25s ease;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 30px rgba(46,163,242,0.15);
}

html { font-size: 14px; }

body {
  font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* === NAV BAR === */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 56px;
  background: rgba(10, 10, 10, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  font-size: 1rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.02em;
}

.nav-links {
  display: flex;
  gap: 4px;
}

.nav-link {
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-dim);
  text-decoration: none;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  position: relative;
}

.nav-link:hover {
  color: var(--white);
  text-decoration: none;
}

.nav-link.active {
  color: var(--primary);
}

.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 16px;
  right: 16px;
  height: 2px;
  background: var(--primary);
  border-radius: 1px;
}

.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--white);
  font-size: 24px;
  cursor: pointer;
}

/* === HEADER === */
.dashboard-header {
  padding: 80px 40px 32px;
  background: linear-gradient(135deg, #0a0a0a 0%, #141414 100%);
}

.dashboard-header h1 {
  font-size: 2rem;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.03em;
}

.dashboard-header .subtitle {
  font-size: 0.95rem;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Legacy header for non-dashboard pages */
header {
  padding: 72px 40px 0;
}

.header-content h1 {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.02em;
}

.gold-line {
  width: 48px;
  height: 2px;
  background: var(--primary);
  margin-top: 8px;
}

/* === STATS BAR === */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 0 40px 32px;
  overflow-x: auto;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 24px;
  min-width: 140px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color var(--transition);
}

.stat-card:hover {
  border-color: var(--primary);
}

.stat-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  font-weight: 600;
}

.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--primary);
}

/* === FILTER BAR === */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 40px 24px;
  overflow-x: auto;
  flex-wrap: wrap;
}

.filter-pill {
  padding: 8px 18px;
  border-radius: 24px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-dim);
  font-size: 0.82rem;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.filter-pill:hover {
  border-color: var(--primary);
  color: var(--white);
}

.filter-pill.active {
  background: var(--primary);
  color: var(--white);
  border-color: var(--primary);
}

.filter-search {
  position: relative;
  margin-left: auto;
}

.filter-search input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--white);
  padding: 8px 16px 8px 38px;
  font-size: 0.85rem;
  font-family: inherit;
  width: 220px;
  transition: border-color var(--transition);
}

.filter-search input:focus {
  outline: none;
  border-color: var(--primary);
}

.filter-search input::placeholder {
  color: var(--text-muted);
}

.filter-search svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--text-dim);
  pointer-events: none;
}

.filter-sort {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--white);
  padding: 8px 16px;
  font-size: 0.82rem;
  font-family: inherit;
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 32px;
}

.filter-sort:focus {
  outline: none;
  border-color: var(--primary);
}

.toolbar-actions {
  display: flex;
  gap: 8px;
}

/* === HOTEL CARDS GRID === */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  padding: 0 40px 40px;
}

.hotel-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all var(--transition);
  cursor: pointer;
  display: flex;
  flex-direction: column;
}

.hotel-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(46, 163, 242, 0.3);
}

.hotel-card.shortlisted {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px var(--gold);
}

.hotel-card.shortlisted .card-fav {
  color: var(--gold);
  background: var(--gold-dim);
}

/* Card Image */
.card-img-wrap {
  position: relative;
  width: 100%;
  height: 240px;
  overflow: hidden;
  background: linear-gradient(135deg, #141414, #1a2a3a);
}

.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.hotel-card:hover .card-img {
  transform: scale(1.05);
}

.card-gradient {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  pointer-events: none;
}

.card-rating {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(201, 169, 78, 0.9);
  color: var(--white);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 700;
  z-index: 2;
  backdrop-filter: blur(4px);
}

.card-price {
  position: absolute;
  bottom: 14px;
  left: 16px;
  color: var(--white);
  font-size: 1.1rem;
  font-weight: 700;
  z-index: 2;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

.card-fav {
  position: absolute;
  top: 12px;
  left: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  color: var(--white);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  z-index: 2;
}

.card-fav:hover {
  background: rgba(201, 169, 78, 0.3);
  color: var(--gold);
}

.card-new-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--primary);
  color: var(--white);
  padding: 3px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  z-index: 2;
}

/* Card Initials Fallback */
.card-initials {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #141414, #1a3a5a);
  font-size: 3rem;
  font-weight: 800;
  color: rgba(46, 163, 242, 0.3);
  letter-spacing: 4px;
}

/* Card Body */
.card-body {
  padding: 16px 20px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-name {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 4px;
}

.card-location {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.tag {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.7rem;
  font-weight: 600;
  background: var(--bg-elevated);
  color: var(--text-dim);
  border: 1px solid var(--border-light);
}

.tag.luxury {
  background: var(--gold-dim);
  color: var(--gold);
  border-color: transparent;
}

.tag.contacted {
  background: var(--primary-dim);
  color: var(--primary);
  border-color: transparent;
}

.tag.responded {
  background: var(--green-dim);
  color: var(--green);
  border-color: transparent;
}

.tag.approved {
  background: var(--gold-dim);
  color: var(--gold);
  border-color: transparent;
}

/* Card Actions */
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  align-items: center;
}

.btn-email {
  flex: 1;
  padding: 10px 16px;
  background: var(--primary);
  color: var(--white);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-email:hover {
  background: var(--primary-hover);
}

.btn-view {
  padding: 10px 16px;
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
}

.btn-view:hover {
  background: var(--primary-dim);
  text-decoration: none;
}

.card-status {
  margin-left: auto;
}

/* Status pills */
.status-pill {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: capitalize;
  letter-spacing: 0.02em;
}

.status-not_contacted {
  background: rgba(136, 136, 136, 0.15);
  color: #999;
}

.status-contacted {
  background: var(--primary-dim);
  color: var(--primary);
}

.status-responded {
  background: var(--green-dim);
  color: var(--green);
}

.status-approved {
  background: var(--gold-dim);
  color: var(--gold);
}

.status-booked {
  background: rgba(168, 85, 247, 0.15);
  color: var(--purple);
}

/* === BUTTONS === */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
  white-space: nowrap;
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--text);
}

.btn-outline:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.btn-primary {
  background: var(--primary);
  color: var(--white);
  font-weight: 600;
}

.btn-primary:hover {
  background: var(--primary-hover);
}

.btn-gold {
  background: var(--gold);
  color: #0a0a0a;
  font-weight: 600;
}

.btn-gold:hover {
  background: #d4b85c;
}

.btn-danger {
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
}

.btn-danger:hover {
  background: var(--red);
  color: var(--white);
}

.btn-sm {
  padding: 6px 12px;
  font-size: 0.8rem;
}

/* === EMPTY STATE === */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.empty-state svg {
  margin-bottom: 12px;
  opacity: 0.3;
}

.empty-state p {
  font-size: 0.95rem;
}

/* === MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 90%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.25s ease;
}

.modal-overlay.active .modal {
  transform: translateY(0);
}

.modal-sm { max-width: 480px; }
.modal-lg { max-width: 780px; }

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.modal-header h2 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--white);
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color var(--transition);
}

.modal-close:hover { color: var(--white); }

.modal-body { padding: 24px; }

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group.full-width {
  grid-column: 1 / -1;
}

.form-group label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  font-weight: 500;
}

.form-group input,
.form-group select,
.form-group textarea {
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xs);
  color: var(--white);
  padding: 10px 12px;
  font-size: 0.875rem;
  font-family: inherit;
  transition: border-color var(--transition);
  resize: vertical;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
}

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
}

/* === EMAIL COMPOSER === */
.email-field {
  margin-bottom: 16px;
}

.email-field label {
  display: block;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  font-weight: 500;
  margin-bottom: 6px;
}

.email-field input,
.email-field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xs);
  color: var(--white);
  padding: 10px 12px;
  font-size: 0.875rem;
  font-family: inherit;
  transition: border-color var(--transition);
}

.email-field textarea {
  min-height: 200px;
  resize: vertical;
  line-height: 1.6;
}

.email-field input:focus,
.email-field textarea:focus {
  outline: none;
  border-color: var(--primary);
}

.email-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn-copy {
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  color: var(--text);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-copy:hover { border-color: var(--primary); color: var(--primary); }
.btn-copy.copied { border-color: var(--green); color: var(--green); }

.btn-gmail {
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-gmail:hover { background: var(--primary-dim); }

.btn-mark-contacted {
  background: var(--green);
  color: var(--white);
  border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  margin-left: auto;
}

.btn-mark-contacted:hover { background: #27ae60; }
.btn-mark-contacted.marked { background: var(--text-dim); cursor: default; }

/* === HOTEL DETAIL PAGE === */
.hotel-detail-page {
  max-width: 1000px;
  margin: 0 auto;
  padding-bottom: 60px;
}

.hero-wrap {
  position: relative;
  width: 100%;
  height: 400px;
  overflow: hidden;
  margin-top: 56px;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-gradient {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 200px;
  background: linear-gradient(transparent, var(--bg));
}

.hero-content {
  position: absolute;
  bottom: 32px;
  left: 40px;
  right: 40px;
  z-index: 2;
}

.hero-content h1 {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--white);
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.hero-content .hotel-subtitle {
  font-size: 1rem;
  color: rgba(255,255,255,0.8);
  margin-top: 4px;
}

.hero-initials {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a0a0a, #1a3a5a);
  font-size: 6rem;
  font-weight: 800;
  color: rgba(46, 163, 242, 0.2);
  letter-spacing: 8px;
}

/* Quick Actions */
.quick-actions {
  display: flex;
  gap: 8px;
  padding: 24px 40px;
  flex-wrap: wrap;
}

.quick-actions .btn.btn-active {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
}

/* Profile Grid */
.hotel-profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 0 40px 20px;
}

.profile-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px 24px;
}

.profile-section h3 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--primary);
  margin-bottom: 16px;
  font-weight: 600;
}

.profile-fields .detail-field {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.detail-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  min-width: 110px;
  flex-shrink: 0;
}

.detail-value {
  font-size: 0.85rem;
  color: var(--white);
  word-break: break-all;
}

.detail-value a {
  color: var(--primary);
  text-decoration: none;
}

.detail-value a:hover { text-decoration: underline; }

.profile-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.profile-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--primary);
  border: 1px solid var(--primary-dim);
  border-radius: var(--radius-sm);
  text-decoration: none;
  transition: all var(--transition);
}

.profile-link:hover {
  background: var(--primary-dim);
  border-color: var(--primary);
  text-decoration: none;
}

/* Notes */
.notes-section {
  margin: 0 40px 20px;
}

.notes-editor {
  width: 100%;
  min-height: 120px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--white);
  padding: 12px;
  font-size: 0.875rem;
  font-family: inherit;
  resize: vertical;
  transition: border-color var(--transition);
  line-height: 1.6;
}

.notes-editor:focus {
  outline: none;
  border-color: var(--primary);
}

.notes-status {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 6px;
  text-align: right;
}

.notes-status.saving { color: var(--primary); }
.notes-status.saved { color: var(--green); }

/* Timeline */
.timeline-section {
  margin: 0 40px 20px;
}

.timeline-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.timeline-header h3 { margin-bottom: 0; }

.timeline-form {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.timeline-form select,
.timeline-form input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--white);
  padding: 8px 12px;
  font-size: 0.85rem;
  font-family: inherit;
}

.timeline-form input {
  flex: 1;
  min-width: 200px;
}

.timeline-form select:focus,
.timeline-form input:focus {
  outline: none;
  border-color: var(--primary);
}

.timeline-list {
  position: relative;
  padding-left: 24px;
}

.timeline-entry {
  position: relative;
  padding-bottom: 20px;
  padding-left: 16px;
  border-left: 1px solid var(--border);
}

.timeline-entry:last-child {
  border-left-color: transparent;
  padding-bottom: 0;
}

.timeline-dot {
  position: absolute;
  left: -5px;
  top: 4px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid var(--bg-card);
}

.timeline-action {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 2px;
}

.timeline-note {
  font-size: 0.8rem;
  color: var(--text);
  margin-bottom: 2px;
}

.timeline-date {
  font-size: 0.7rem;
  color: var(--text-dim);
}

.text-dim {
  color: var(--text-dim);
  font-size: 0.85rem;
}

/* === PIPELINE BOARD (outreach) === */
.pipeline-stats {
  display: flex;
  gap: 16px;
  padding: 24px 40px;
  overflow-x: auto;
}

.pipeline-board {
  display: flex;
  gap: 16px;
  padding: 0 40px 40px;
  overflow-x: auto;
  min-height: calc(100vh - 280px);
  align-items: flex-start;
}

.pipeline-column {
  flex: 1;
  min-width: 220px;
  max-width: 320px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  transition: border-color var(--transition);
}

.pipeline-column.drag-over {
  border-color: var(--primary);
  box-shadow: 0 0 0 1px var(--primary-dim);
}

.column-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.column-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.column-header h3 {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--white);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  flex: 1;
}

.column-count {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-dim);
  background: var(--bg-elevated);
  padding: 2px 8px;
  border-radius: 10px;
}

.column-cards {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 60px;
}

.pipeline-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  cursor: grab;
  transition: all var(--transition);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.pipeline-card:hover {
  border-color: rgba(46, 163, 242, 0.4);
}

.pipeline-card.dragging {
  opacity: 0.4;
}

.pipeline-thumb {
  width: 56px;
  height: 56px;
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
  background: linear-gradient(135deg, #141414, #1a3a5a);
}

.pipeline-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.pipeline-thumb-initials {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
  color: rgba(46, 163, 242, 0.4);
}

.pipeline-info {
  flex: 1;
  min-width: 0;
}

.card-name-pipe {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-contact {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.card-date {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.pipeline-card .card-actions-pipe {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-top: 4px;
}

.card-btn {
  padding: 3px 8px;
  font-size: 0.7rem;
  font-family: inherit;
  font-weight: 500;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-dim);
  text-decoration: none;
}

.card-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.card-btn-next { margin-left: auto; }

/* === IMPORT === */
.import-hint {
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 16px;
}

#csv-file {
  margin-bottom: 16px;
  font-size: 0.85rem;
  color: var(--text);
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* === RESPONSIVE === */
@media (max-width: 900px) {
  .top-nav { padding: 0 20px; }
  .nav-links { display: none; }
  .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 12px 20px; }
  .hamburger { display: block; }
  .dashboard-header, header { padding-left: 20px; padding-right: 20px; }
  .stats-bar, .filter-bar { padding-left: 20px; padding-right: 20px; }
  .cards-grid { grid-template-columns: 1fr; padding: 0 20px 20px; }
  .hotel-profile-grid { grid-template-columns: 1fr; padding: 0 20px 20px; }
  .quick-actions { padding: 16px 20px; }
  .notes-section, .timeline-section { margin-left: 20px; margin-right: 20px; }
  .pipeline-board { padding: 0 20px 40px; }
  .pipeline-stats { padding: 24px 20px; }
  .pipeline-column { min-width: 260px; }
  .form-grid { grid-template-columns: 1fr; }
  .hero-content { left: 20px; right: 20px; }
  .hero-wrap { height: 280px; }
  .timeline-form { flex-direction: column; }
  .timeline-form input { min-width: unset; }
}

@media (max-width: 768px) {
  .cards-grid { grid-template-columns: 1fr; gap: 16px; }
  .card-img-wrap { height: 200px; }
}

  (function() {
    'use strict';

    const LS_KEY = 'hotel-researcher-hotels';

    function loadAllHotels() {
      const stored = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
      if (!stored) return JSON.parse(JSON.stringify(HOTELS_DATA));
      const map = {};
      HOTELS_DATA.forEach(h => map[h.id] = JSON.parse(JSON.stringify(h)));
      stored.forEach(h => map[h.id] = h);
      return Object.values(map);
    }

    function saveHotels(hotels) {
      localStorage.setItem(LS_KEY, JSON.stringify(hotels));
    }

    let hotels = loadAllHotels();
    let draggedId = null;

    function getStage(h) {
      const o = h.outreach || {};
      if (o.bookedDates) return 'booked';
      if (o.approved) return 'approved';
      if (o.responded) return 'responded';
      if (o.contacted) return 'contacted';
      return 'not_contacted';
    }

    function getLastAction(h) {
      if (h.timeline && h.timeline.length > 0) return formatDate(h.timeline[0].date);
      return formatDate(h.updatedAt);
    }

    function formatDate(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
    }

    const PEXELS_IDS = [261102, 338504, 189296, 258154, 1134176, 2507010, 2034335, 1268871, 2373201, 1457842, 2029722, 3155666, 2462015, 1743231, 2417842, 2029731, 3225531, 2404843, 1488327, 2096983];
    function getPexelsUrl(name) {
      let hash = 0;
      const n = (name || '').toLowerCase();
      for (let i = 0; i < n.length; i++) { hash = ((hash << 5) - hash) + n.charCodeAt(i); hash = hash & hash; }
      const idx = Math.abs(hash) % PEXELS_IDS.length;
      const id = PEXELS_IDS[idx];
      return 'https://images.pexels.com/photos/' + id + '/pexels-photo-' + id + '.jpeg?auto=compress&cs=tinysrgb&w=800';
    }

    function getThumbUrl(h) {
      return h.imageUrl || getPexelsUrl(h.name);
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function render() {
      const stages = { not_contacted: [], contacted: [], responded: [], approved: [], booked: [] };
      hotels.forEach(h => { stages[getStage(h)].push(h); });

      Object.keys(stages).forEach(stage => {
        const container = document.getElementById('col-' + stage);
        const count = document.getElementById('col-count-' + stage);
        const statEl = document.getElementById('ps-' + stage.replace('_', '-'));
        count.textContent = stages[stage].length;
        if (statEl) statEl.textContent = stages[stage].length;

        container.innerHTML = stages[stage].map(h => 
          '<div class="pipeline-card" draggable="true" data-id="' + h.id + '">' +
          '<div class="pipeline-thumb">' +
          '<img src="' + getThumbUrl(h) + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
          '<div class="pipeline-thumb-initials" style="display:none">' + esc(getInitials(h.name)) + '</div>' +
          '</div>' +
          '<div class="pipeline-info">' +
          '<div class="card-name-pipe">' + esc(h.name) + '</div>' +
          '<div class="card-contact">' + esc(h.contactPerson || h.contact_person || '') + '</div>' +
          '<div class="card-date">' + getLastAction(h) + '</div>' +
          '<div class="card-actions-pipe">' +
          (stage !== 'not_contacted' ? '<button class="card-btn card-btn-prev" data-id="' + h.id + '" data-dir="prev">&larr;</button>' : '') +
          '<a href="hotel.html?id=' + h.id + '" class="card-btn">View</a>' +
          (stage !== 'booked' ? '<button class="card-btn card-btn-next" data-id="' + h.id + '" data-dir="next">&rarr;</button>' : '') +
          '</div></div></div>'
        ).join('');

        // Drag events
        container.querySelectorAll('.pipeline-card').forEach(card => {
          card.addEventListener('dragstart', e => {
            draggedId = card.dataset.id;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            draggedId = null;
            document.querySelectorAll('.pipeline-column').forEach(c => c.classList.remove('drag-over'));
          });
        });

        // Move buttons
        container.querySelectorAll('.card-btn-prev, .card-btn-next').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            moveCard(btn.dataset.id, btn.dataset.dir);
          });
        });
      });

      // Drop zones
      document.querySelectorAll('.pipeline-column').forEach(col => {
        col.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; col.classList.add('drag-over'); });
        col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
        col.addEventListener('drop', e => {
          e.preventDefault();
          col.classList.remove('drag-over');
          if (draggedId) moveToStage(draggedId, col.dataset.stage);
        });
      });
    }

    const stageOrder = ['not_contacted', 'contacted', 'responded', 'approved', 'booked'];

    function moveCard(id, dir) {
      const h = hotels.find(x => x.id === id);
      if (!h) return;
      const idx = stageOrder.indexOf(getStage(h));
      const newIdx = dir === 'next' ? idx + 1 : idx - 1;
      if (newIdx < 0 || newIdx >= stageOrder.length) return;
      moveToStage(id, stageOrder[newIdx]);
    }

    function moveToStage(id, stage) {
      const h = hotels.find(x => x.id === id);
      if (!h) return;
      if (!h.outreach) h.outreach = {};
      h.outreach.contacted = ['contacted','responded','approved','booked'].includes(stage);
      h.outreach.responded = ['responded','approved','booked'].includes(stage);
      h.outreach.approved = ['approved','booked'].includes(stage);
      h.outreach.bookedDates = stage === 'booked' ? 'TBD' : '';

      if (!h.timeline) h.timeline = [];
      const actionMap = {
        not_contacted: 'Reset to Not Contacted',
        contacted: 'Marked as Contacted',
        responded: 'Marked as Responded',
        approved: 'Marked as Approved',
        booked: 'Marked as Booked'
      };
      h.timeline.unshift({ id: 'tl-' + Date.now(), action: actionMap[stage], note: '', date: new Date().toISOString() });
      h.updatedAt = new Date().toISOString();

      saveHotels(hotels);
      render();
    }

    render();
  })();
  </script>
